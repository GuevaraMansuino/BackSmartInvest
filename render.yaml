services:
  - type: web
    name: smart-invest-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_TIMEZONE
        value: America/Buenos_Aires
      - key: BACKEND_CORS_ORIGINS
        value: "*"
